name: Phase 7 - Automation & Quality (CI/CD)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Python Linting & Quality
  python-quality:
    name: Python Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.1.0"
      
      - name: Install dependencies
        run: |
          cd backend
          uv sync
      
      - name: Run Ruff (Linting)
        run: |
          cd backend
          uv run ruff check app/ --fix
      
      - name: Run Ruff (Formatting)
        run: |
          cd backend
          uv run ruff format app/ --check
      
      - name: Run Flake8 (Code Style)
        run: |
          cd backend
          uv run flake8 app/ --max-line-length=100 --exclude=__pycache__
        continue-on-error: true
      
      - name: Run mypy (Type Checking)
        run: |
          cd backend
          uv run mypy app/ --ignore-missing-imports
        continue-on-error: true

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests with Pytest
    runs-on: ubuntu-latest
    needs: python-quality
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.1.0"
      
      - name: Install dependencies
        run: |
          cd backend
          uv sync
      
      - name: Run pytest
        run: |
          cd backend
          uv run pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Job 3: Build Docker Images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false
          tags: hr-pulse-backend:latest
      
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: false
          tags: hr-pulse-frontend:latest
      
      - name: Verify Images Built Successfully
        run: |
          echo "✅ Backend image built successfully"
          echo "✅ Frontend image built successfully"

  # Optional: Frontend Linting (Node.js)
  frontend-quality:
    name: Frontend Linting & Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
        continue-on-error: true
      
      - name: Build Next.js
        run: |
          cd frontend
          npm run build

  # Summary
  pipeline-status:
    name: Pipeline Status Summary
    runs-on: ubuntu-latest
    needs: [python-quality, unit-tests, docker-build, frontend-quality]
    if: always()
    
    steps:
      - name: Check Pipeline Status
        run: |
          if [ "${{ needs.python-quality.result }}" == "failure" ] || \
             [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          else
            echo "✅ All checks passed!"
          